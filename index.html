<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>NYC Landmarks &amp; Property Value — Manhattan CB8</title>
<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css">
<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.1/dist/chart.umd.min.js"></script>
<style>
  :root { --bg:#0f1115; --panel:#171a21; --ink:#e8eaed; --muted:#9aa0aa;
          --accent:#5b8def; --gold:#d9a441; --line:#262b35; }
  * { box-sizing:border-box; }
  html,body { margin:0; height:100%; font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif;
              background:var(--bg); color:var(--ink); }
  body { display:flex; flex-direction:column; }
  #proj-nav { display:flex; background:var(--panel); border-bottom:1px solid var(--line);
              padding:0 16px; flex-shrink:0; z-index:1000; }
  #proj-nav .proj-link { display:inline-flex; align-items:center; padding:10px 14px;
              font-size:13px; font-weight:500; color:var(--muted); text-decoration:none;
              border-bottom:2px solid transparent; }
  #proj-nav .proj-link:hover { color:var(--ink); }
  #proj-nav .proj-link.active { color:var(--accent); border-bottom-color:var(--accent); }
  #app { display:grid; grid-template-columns:1fr 420px; flex:1; min-height:0; }
  #map { height:100%; }
  #panel { background:var(--panel); border-left:1px solid var(--line); overflow-y:auto; padding:20px; }
  h1 { font-size:16px; margin:0 0 4px; }
  .sub { color:var(--muted); font-size:12px; margin-bottom:16px; line-height:1.5; }
  .hint { color:var(--muted); font-size:13px; padding:24px 0; text-align:center; }
  #summary { border:1px solid var(--line); border-radius:12px; padding:14px;
             margin-bottom:16px; background:linear-gradient(180deg,#1a1e27,#141821); }
  .summary-title { font-size:12px; text-transform:uppercase; letter-spacing:.05em;
             color:var(--gold); margin-bottom:10px; font-weight:600; }
  .sgrid { display:grid; grid-template-columns:1fr 1fr 1fr; gap:8px; }
  .scell .k { color:var(--muted); font-size:10px; text-transform:uppercase; letter-spacing:.03em; line-height:1.3; }
  .scell .v { font-size:16px; font-weight:600; margin-top:3px; }
  .scell .v.neutral { color:var(--accent); }
  .srow { color:var(--muted); font-size:12px; margin-top:12px; line-height:1.5;
          border-top:1px solid var(--line); padding-top:10px; }
  .srow b { color:var(--ink); }
  .name { font-size:18px; font-weight:600; margin:0 0 2px; }
  .addr { color:var(--muted); font-size:13px; margin-bottom:14px; }
  .stats { display:grid; grid-template-columns:1fr 1fr; gap:10px; margin:14px 0; }
  .stat { background:#11141a; border:1px solid var(--line); border-radius:10px; padding:10px 12px; }
  .stat .k { color:var(--muted); font-size:11px; text-transform:uppercase; letter-spacing:.04em; }
  .stat .v { font-size:18px; font-weight:600; margin-top:3px; }
  .pos { color:#5fc77e; } .neg { color:#e06c5e; }
  .chartbox { background:#11141a; border:1px solid var(--line); border-radius:10px; padding:10px; margin-top:14px; }
  .chartbox h3 { font-size:12px; color:var(--muted); margin:2px 4px 8px; font-weight:500; }
  .desig { font-size:12px; color:var(--muted); margin-top:10px; line-height:1.5; }
  .badge { display:inline-block; background:#1d2330; color:var(--accent); border-radius:6px;
           padding:2px 7px; font-size:11px; margin-right:6px; }
  .toggle { display:flex; gap:6px; margin:10px 0 0; }
  .toggle button { flex:1; background:#11141a; color:var(--muted); border:1px solid var(--line);
           border-radius:8px; padding:6px; font-size:12px; cursor:pointer; }
  .toggle button.active { color:var(--ink); border-color:var(--accent); }
  .legend { background:#171a21e6; border:1px solid var(--line); border-radius:8px;
            padding:8px 10px; font-size:11px; color:var(--ink); line-height:1.7; }
  .legend b { display:block; margin-bottom:4px; color:var(--muted); font-weight:600; font-size:10px;
              text-transform:uppercase; letter-spacing:.03em; }
  .legend i { display:inline-block; width:11px; height:11px; border-radius:50%;
              margin-right:6px; vertical-align:-1px; }
  .legend i.dist { border-radius:2px; background:#5b8def44; border:1px dashed #5b8def; }
  .legend .bldg-toggle { display:flex; align-items:center; margin-top:6px;
            padding-top:6px; border-top:1px solid var(--line); cursor:pointer; }
  .legend .bldg-toggle input { margin:0 6px 0 0; }
  .legend .lu-key { display:flex; flex-wrap:wrap; gap:3px 10px; margin-top:5px;
            max-width:230px; font-size:10px; color:var(--muted); }
  .legend .lu-key span { display:flex; align-items:center; }
  .leaflet-popup-content { margin:10px 12px; }
  .pp-name { font-weight:600; font-size:13px; } .pp-val { color:#333; font-size:12px; }
</style>
</head>
<body>
<nav id="proj-nav">
  <a href="index.html" class="proj-link active">NYC Landmarks</a>
  <a href="crash_index.html" class="proj-link">Pedestrian Safety</a>
</nav>
<div id="app">
  <div id="map"></div>
  <div id="panel">
    <h1>Landmarks &amp; Property Value — Manhattan CB8</h1>
    <div class="sub">Individual landmarks (pins colored by value growth vs NYC) and
      historic districts (shaded) on the Upper East Side &amp; Roosevelt Island.
      Click a pin to explore. <span id="count"></span></div>
    <div id="summary"></div>
    <div id="detail"><div class="hint">Select a landmark on the map →</div></div>
  </div>
</div>
<script>
const fmt = n => n==null ? "—" : "$"+Math.round(n).toLocaleString();
const pct = n => (n>=0?"+":"")+n.toFixed(0)+"%";
let DATA, chart, mode="index";
const LU_COLORS = {
  "1-2 Family":"#8ecae6", "Walk-up Apts":"#95d5b2", "Elevator Apts":"#4895ef",
  "Mixed Res/Com":"#ffb703", "Commercial/Office":"#fb8500",
  "Public/Institutional":"#c77dff", "Parking":"#adb5bd", "Vacant":"#6c757d",
  "Industrial":"#e07a5f", "Transportation":"#8d99ae", "Open Space":"#52b788"
};

document.addEventListener("DOMContentLoaded", ()=>{ DATA=window.SITE_DATA; init(DATA); });

function init(d){
  document.getElementById("count").textContent =
    `${d.landmarks.length} landmarks · values ${Math.min(...Object.keys(d.citywide))}–${Math.max(...Object.keys(d.citywide))}`;
  const map = L.map("map",{zoomControl:true, preferCanvas:true}).setView([40.773,-73.957],14);
  L.tileLayer("https://{s}.basemaps.cartocdn.com/dark_all/{z}/{x}/{y}{r}.png",
    {attribution:"© OpenStreetMap © CARTO", subdomains:"abcd", maxZoom:19}).addTo(map);

  const nycChg0 = (d.citywide[2027]-d.citywide[2011])/d.citywide[2011]*100;

  // Historic district polygons (clickable; drawn under everything)
  (d.districts||[]).forEach(dist=>{
    const latlngs = dist.rings.map(ring=>ring.map(([lon,lat])=>[lat,lon]));
    const s = dist.stats||{};
    const yr = s.yearRange ? `${s.yearRange[0]}–${s.yearRange[1]}` : "?";
    const apprLine = s.chg!=null
      ? `<br>${pct(s.chg)} value since 2011 (NYC ${pct(nycChg0)})` : "";
    L.polygon(latlngs, {color:"#5b8def", weight:1.3, fillColor:"#5b8def",
      fillOpacity:.10, dashArray:"3,3"})
      .bindTooltip(`<b>${dist.name}</b> · designated ${dist.desyear||"?"}`+
        `<br>${s.n||0} buildings · built ${yr}`+
        `<br>${(s.resUnits||0).toLocaleString()} residential units`+
        `<br>$${((s.marketTot||0)/1e9).toFixed(2)}B market value`+
        apprLine + `<br><i>click for detail →</i>`, {sticky:true})
      .on("click",()=>selectDistrict(dist))
      .addTo(map);
  });

  // Individual buildings inside the districts (PLUTO lots), colored by land use
  const blayer = L.layerGroup();
  const luPresent = new Set((d.buildings||[]).map(b=>b.lu));
  (d.buildings||[]).forEach(b=>{
    L.circleMarker([b.lat,b.lon],
      {radius:3, stroke:false, fillColor:LU_COLORS[b.lu]||"#c9d4e8", fillOpacity:.75})
      .bindTooltip(`<b>${b.addr||"—"}</b><br>${b.lu||""}`+
        (b.yb?` · built ${b.yb}`:"")+(b.fl?` · ${b.fl} fl`:"")+
        (b.ur?`<br>${b.ur} residential units`:"")+
        (b.mv?`<br>${fmt(b.mv)} market value`
            :(b.at?`<br>${fmt(b.at)} assessed`:"")), {direction:"top"})
      .addTo(blayer);
  });
  blayer.addTo(map);

  renderSummary(d);

  // citywide 2011->2027 change is the benchmark each landmark is judged against
  const nycChg = (d.citywide[2027]-d.citywide[2011])/d.citywide[2011]*100;

  d.landmarks.forEach(lm=>{
    const yrs = Object.keys(lm.series).map(Number).sort((a,b)=>a-b);
    lm._yrs = yrs; lm._latest = lm.series[yrs[yrs.length-1]];
    // compare over the same full span as NYC when possible
    let color="#9aa0aa", note="not enough history to rate";
    if(lm.series[2011] && lm.series[2027]){
      const perf = (lm.series[2027]-lm.series[2011])/lm.series[2011]*100;
      const beat = perf>=nycChg;
      color = beat ? "#5fc77e" : "#e06c5e";
      note = `${pct(perf)} since 2011 — ${beat?"beat":"lagged"} NYC (${pct(nycChg)})`;
    }
    const m = L.circleMarker([lm.lat,lm.lon],
      {radius:7, color:"#11141a", weight:1.2, fillColor:color, fillOpacity:.85})
      .addTo(map);
    m.bindTooltip(`<span class="pp-name">${lm.name}</span><br>`+
      `<span class="pp-val">${fmt(lm._latest)} · ${note}</span>`, {direction:"top"});
    m.on("click",()=>select(lm));
  });

  // legend (with a toggle for the building layer)
  const lg = L.control({position:"bottomright"});
  lg.onAdd = ()=>{ const el=L.DomUtil.create("div","legend");
    el.innerHTML = `<b>Landmarks — value change vs NYC, 2011–27</b>`+
      `<div><i style="background:#5fc77e"></i>Beat NYC (≥${pct(nycChg)})</div>`+
      `<div><i style="background:#e06c5e"></i>Lagged NYC</div>`+
      `<div><i style="background:#9aa0aa"></i>Insufficient history</div>`+
      `<div><i class="dist"></i>Historic district (click for detail)</div>`+
      `<label class="bldg-toggle"><input type="checkbox" id="bToggle" checked>`+
      `Buildings by land use (${(d.buildings||[]).length.toLocaleString()})</label>`+
      `<div class="lu-key">`+
      Object.entries(LU_COLORS).filter(([k])=>luPresent.has(k))
        .map(([k,c])=>`<span><i style="background:${c}"></i>${k}</span>`).join("")+
      `</div>`;
    L.DomEvent.disableClickPropagation(el);
    setTimeout(()=>{ document.getElementById("bToggle").onchange = e=>{
      e.target.checked ? blayer.addTo(map) : map.removeLayer(blayer); }; },0);
    return el; };
  lg.addTo(map);
}

function selectDistrict(dist){
  window._sel = null;
  const s = dist.stats||{}, yr = s.yearRange ? `${s.yearRange[0]}–${s.yearRange[1]}` : "?";
  const nyc = (DATA.citywide[2027]-DATA.citywide[2011])/DATA.citywide[2011]*100;
  const beat = s.chg!=null && s.chg>=nyc;
  document.getElementById("detail").innerHTML = `
    <div class="name">${dist.name}</div>
    <div class="addr">Historic District · designated ${dist.desyear||"?"}</div>
    <div class="stats">
      <div class="stat"><div class="k">Buildings</div><div class="v">${(s.n||0).toLocaleString()}</div></div>
      <div class="stat"><div class="k">Residential units</div><div class="v">${(s.resUnits||0).toLocaleString()}</div></div>
      <div class="stat"><div class="k">Market value</div><div class="v">$${((s.marketTot||0)/1e9).toFixed(2)}B</div></div>
      <div class="stat"><div class="k">Built</div><div class="v" style="font-size:15px">${yr}</div></div>
      <div class="stat"><div class="k">Value since 2011</div>
        <div class="v ${s.chg>=0?'pos':'neg'}">${s.chg!=null?pct(s.chg):"—"}</div></div>
      <div class="stat"><div class="k">vs NYC (${pct(nyc)})</div>
        <div class="v ${beat?'pos':'neg'}">${s.chg!=null?(beat?"beat":"lagged"):"—"}</div></div>
    </div>
    <div class="desig">Appreciation measured on a fixed basket of
      ${(s.basketN||0).toLocaleString()} parcels valued in both 2011 and 2027.</div>
    <div class="chartbox"><h3>Market value indexed to 100 at 2011 — district vs NYC</h3>
      <canvas id="chart" height="200"></canvas></div>`;
  drawDistrict(dist);
}

function drawDistrict(dist){
  const ser = dist.stats.series||{};
  const yrs = Object.keys(ser).map(Number).sort((a,b)=>a-b);
  if(!yrs.length) return;
  const base = yrs[0];
  const allYears = Object.keys(DATA.citywide).map(Number).sort((a,b)=>a-b).filter(y=>y>=base);
  const dIdx = allYears.map(y=> ser[y]==null?null:ser[y]/ser[base]*100);
  const cIdx = allYears.map(y=> DATA.citywide[y]==null?null:DATA.citywide[y]/DATA.citywide[base]*100);
  if(chart) chart.destroy();
  chart = new Chart(document.getElementById("chart"),{
    type:"line",
    data:{labels:allYears, datasets:[
      {label:dist.name.replace(" Historic District",""), data:dIdx,
       borderColor:"#5b8def", backgroundColor:"#5b8def22", tension:.25,
       spanGaps:true, pointRadius:3, fill:true},
      {label:"NYC average", data:cIdx, borderColor:"#9aa0aa", borderDash:[5,4],
       tension:.25, spanGaps:true, pointRadius:0}]},
    options:{responsive:true, interaction:{mode:"index",intersect:false},
      plugins:{legend:{labels:{color:"#9aa0aa",boxWidth:12,font:{size:11}}},
        tooltip:{callbacks:{label:c=>`${c.dataset.label}: ${c.parsed.y?.toFixed(0)}`}}},
      scales:{x:{ticks:{color:"#9aa0aa",font:{size:10}},grid:{color:"#1e232c"}},
        y:{ticks:{color:"#9aa0aa",font:{size:10}},grid:{color:"#1e232c"}}}}
  });
}

function renderSummary(d){
  const lms = d.landmarks.map(lm=>{
    const yrs = Object.keys(lm.series).map(Number).sort((a,b)=>a-b);
    return {...lm, _yrs:yrs, _latest:lm.series[yrs[yrs.length-1]]};
  });
  const baseYr = 2011, lastYr = 2027;
  const totVal = lms.reduce((s,lm)=>s+(lm._latest||0),0);
  // % change 2011->2027 for landmarks that span the full range
  const full = lms.filter(lm=>lm.series[baseYr] && lm.series[lastYr]);
  const chg = full.map(lm=>(lm.series[lastYr]-lm.series[baseYr])/lm.series[baseYr]*100)
                  .sort((a,b)=>a-b);
  const median = chg.length ? chg[Math.floor(chg.length/2)] : 0;
  const nyc = (d.citywide[lastYr]-d.citywide[baseYr])/d.citywide[baseYr]*100;
  const outperf = chg.filter(c=>c>nyc).length;
  const cell=(k,v,cls="")=>`<div class="scell"><div class="k">${k}</div><div class="v ${cls}">${v}</div></div>`;
  document.getElementById("summary").innerHTML = `
    <div class="summary-title">CB8 at a glance</div>
    <div class="sgrid">
      ${cell("Landmarks", lms.length)}
      ${cell("Historic districts", (d.districts||[]).length)}
      ${cell("Total market value (2027)", "$"+(totVal/1e9).toFixed(2)+"B")}
      ${cell("Median change ’11→’27", pct(median), median>=0?'pos':'neg')}
      ${cell("NYC average, same span", pct(nyc), 'neutral')}
      ${cell("Beat NYC average", outperf+" of "+chg.length, outperf>chg.length/2?'pos':'neg')}
    </div>
    <div class="srow">Typical CB8 landmark ${median>=nyc?'kept pace with':'lagged'} the city:
      median <b>${pct(median)}</b> vs NYC <b>${pct(nyc)}</b> since 2011.</div>`;
}

function changeSince(lm, year){
  const yrs = lm._yrs.filter(y=>y>=year);
  if(!yrs.length) return null;
  const base = lm.series[yrs[0]], last = lm.series[lm._yrs[lm._yrs.length-1]];
  return {base, baseYr:yrs[0], pct:(last-base)/base*100};
}

function select(lm){
  const yrs = lm._yrs, first=yrs[0], last=yrs[yrs.length-1];
  const overall = changeSince(lm, first);
  // since-designation (true if designated within data window, else earliest)
  const dgy = lm.desyear, hasDesig = dgy && dgy>=first;
  const sinceDes = changeSince(lm, hasDesig?dgy:first);
  const nyc = changeSince({_yrs:Object.keys(DATA.citywide).map(Number).sort((a,b)=>a-b),
                           series:DATA.citywide}, first);

  document.getElementById("detail").innerHTML = `
    <div class="name">${lm.name}</div>
    <div class="addr">${lm.address||""} · ${lm.type||""}</div>
    <div class="stats">
      <div class="stat"><div class="k">Latest value (${last})</div><div class="v">${fmt(lm._latest)}</div></div>
      <div class="stat"><div class="k">Since ${first}</div><div class="v ${overall.pct>=0?'pos':'neg'}">${pct(overall.pct)}</div></div>
      <div class="stat"><div class="k">${hasDesig?`Since designation (${dgy})`:`Since data start`}</div>
        <div class="v ${sinceDes.pct>=0?'pos':'neg'}">${pct(sinceDes.pct)}</div></div>
      <div class="stat"><div class="k">NYC avg, same span</div>
        <div class="v ${nyc.pct>=0?'pos':'neg'}">${pct(nyc.pct)}</div></div>
    </div>
    <div class="desig">
      <span class="badge">Designated ${dgy||"?"}</span>
      ${hasDesig ? "Value tracked from its designation year."
                 : "Designated before valuation data begins (2011); change shown from 2011."}
    </div>
    <div class="toggle">
      <button id="b-index" class="${mode==='index'?'active':''}" onclick="setMode('index')">Indexed vs NYC</button>
      <button id="b-abs" class="${mode==='abs'?'active':''}" onclick="setMode('abs')">Market value ($)</button>
    </div>
    <div class="chartbox"><h3 id="ctitle"></h3><canvas id="chart" height="200"></canvas></div>
  `;
  draw(lm);
}

function setMode(m){ mode=m; if(window._sel) select(window._sel); }

function draw(lm){
  window._sel = lm;
  const yrs = lm._yrs, base = yrs[0];
  const allYears = Object.keys(DATA.citywide).map(Number).sort((a,b)=>a-b)
                    .filter(y=>y>=base);
  const lmIdx = allYears.map(y=> lm.series[y]==null?null:lm.series[y]/lm.series[base]*100);
  const cityBase = DATA.citywide[base];
  const cityIdx = allYears.map(y=> DATA.citywide[y]==null?null:DATA.citywide[y]/cityBase*100);
  const lmAbs = allYears.map(y=> lm.series[y]==null?null:lm.series[y]);

  const indexed = mode==="index";
  document.getElementById("ctitle").textContent = indexed
    ? `Indexed to 100 at ${base} — landmark vs NYC average`
    : `Market value, ${base}–${allYears[allYears.length-1]}`;

  const ds = indexed ? [
      {label:lm.name.slice(0,22), data:lmIdx, borderColor:"#d9a441", backgroundColor:"#d9a44122",
       tension:.25, spanGaps:true, pointRadius:3, fill:true},
      {label:"NYC average", data:cityIdx, borderColor:"#5b8def", borderDash:[5,4],
       tension:.25, spanGaps:true, pointRadius:0}
    ] : [
      {label:lm.name.slice(0,22), data:lmAbs, borderColor:"#d9a441",
       backgroundColor:"#d9a44122", tension:.25, spanGaps:true, pointRadius:3, fill:true}
    ];

  if(chart) chart.destroy();
  chart = new Chart(document.getElementById("chart"),{
    type:"line",
    data:{labels:allYears, datasets:ds},
    options:{responsive:true, interaction:{mode:"index",intersect:false},
      plugins:{legend:{labels:{color:"#9aa0aa",boxWidth:12,font:{size:11}}},
        tooltip:{callbacks:{label:c=> indexed
            ? `${c.dataset.label}: ${c.parsed.y?.toFixed(0)}`
            : `${c.dataset.label}: ${fmt(c.parsed.y)}`}}},
      scales:{
        x:{ticks:{color:"#9aa0aa",font:{size:10}},grid:{color:"#1e232c"}},
        y:{ticks:{color:"#9aa0aa",font:{size:10},
            callback:v=> indexed? v : "$"+(v/1e6).toFixed(1)+"M"},
           grid:{color:"#1e232c"}}}}
  });
}
